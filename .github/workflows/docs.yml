name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/website/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/website/**"
      - ".github/workflows/docs.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: docs/website

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Download WASM plugin from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release download --pattern 'cmakefmt-dprint.wasm' --dir docs/website/public/ --clobber; then
            echo "Downloaded WASM plugin"
          else
            echo "::warning::No WASM release found — playground will not work"
          fi

      - name: Build docs
        run: bun run build
        working-directory: docs/website

      - name: Upload pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs/website/.vitepress/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
