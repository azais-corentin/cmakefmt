name: benchmark-fixtures

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reset_history:
        description: "Delete and re-create the benchmark-history branch (full re-benchmark)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: benchmark-fixtures
  cancel-in-progress: false

jobs:
  benchmark:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Rust toolchain
        run: rustup default stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Capture rust version
        run: |
          echo "RUST_VERSION=$(rustc --version)" >> "$GITHUB_ENV"

      - name: Reset history branch
        if: inputs.reset_history == true || inputs.reset_history == 'true'
        env:
          HISTORY_BRANCH: benchmark-history
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$HISTORY_BRANCH" >/dev/null 2>&1; then
            echo "Deleting remote branch $HISTORY_BRANCH"
            git push origin --delete "$HISTORY_BRANCH"
            # Remove local tracking ref so worktree setup creates orphan
            git branch -D -r "origin/$HISTORY_BRANCH" || true
          else
            echo "Branch $HISTORY_BRANCH does not exist on remote — nothing to reset"
          fi

      - name: Save scripts from HEAD
        run: |
          mkdir -p "$RUNNER_TEMP/scripts"
          cp scripts/collect_benchmark_results.py "$RUNNER_TEMP/scripts/"
          cp scripts/append_benchmark_history.py "$RUNNER_TEMP/scripts/"
          cp scripts/collect_baseline_results.py "$RUNNER_TEMP/scripts/"
          cp scripts/bench_cmake_format_baseline.py "$RUNNER_TEMP/scripts/"
          cp scripts/bench_gersemi_baseline.py "$RUNNER_TEMP/scripts/"
          # Save benchmark harness and fixtures from HEAD so old commits
          # can be benchmarked against both XNNPACK and synthetic fixtures
          mkdir -p "$RUNNER_TEMP/bench"
          cp crates/cmakefmt/benches/formatter_fixtures_bench.rs "$RUNNER_TEMP/bench/"
          cp -r crates/cmakefmt/tests/formatter/respositories/synthetic "$RUNNER_TEMP/bench/synthetic"

      - name: Plan commits to benchmark
        id: plan
        env:
          HISTORY_BRANCH: benchmark-history
          HISTORY_FILE: benchmarks/cmakefmt-fixtures-history.json
          SKIP_FILE: benchmarks/skipped-commits.json
          BACKFILL_START: 4b0fd05
          BATCH_SIZE: "20"
        run: |
          set -euo pipefail

          default_branch_sha="$(git rev-parse HEAD)"
          echo "DEFAULT_BRANCH_SHA=$default_branch_sha" >> "$GITHUB_ENV"

          # Enumerate all commits in backfill range (oldest first)
          all_commits="$(git rev-list --reverse "${BACKFILL_START}^..HEAD")"

          # Collect already-processed and already-skipped SHAs
          done_shas=""
          skipped_shas=""

          if git ls-remote --exit-code --heads origin "$HISTORY_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$HISTORY_BRANCH"

            # Extract commit SHAs from history file
            if git cat-file -e "origin/$HISTORY_BRANCH:$HISTORY_FILE" 2>/dev/null; then
              done_shas="$(git show "origin/$HISTORY_BRANCH:$HISTORY_FILE" \
                | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          entries = data.get('entries', data) if isinstance(data, dict) else data
          for e in entries:
              print(e.get('commit_sha', ''))
          " | sort -u)"
            fi

            # Extract skipped SHAs
            if git cat-file -e "origin/$HISTORY_BRANCH:$SKIP_FILE" 2>/dev/null; then
              skipped_shas="$(git show "origin/$HISTORY_BRANCH:$SKIP_FILE" \
                | python3 -c "
          import json, sys
          for sha in json.load(sys.stdin):
              print(sha)
          " | sort -u)"
            fi
          fi

          # Merge done + skipped into a single exclusion set
          exclude_set="$(printf '%s\n%s' "$done_shas" "$skipped_shas" | sort -u)"

          # Build TODO list: HEAD first (if not yet processed), then oldest-first
          todo_file="$RUNNER_TEMP/commits-to-bench.txt"
          : > "$todo_file"
          count=0

          # Check if HEAD needs benchmarking
          head_sha="$default_branch_sha"
          if ! echo "$exclude_set" | grep -qxF "$head_sha"; then
            echo "$head_sha" >> "$todo_file"
            count=$((count + 1))
          fi

          # Fill remaining slots with oldest-first chronological commits
          while IFS= read -r sha; do
            if [ "$count" -ge "$BATCH_SIZE" ]; then
              break
            fi
            # Skip HEAD (already handled) and excluded commits
            if [ "$sha" = "$head_sha" ]; then
              continue
            fi
            if echo "$exclude_set" | grep -qxF "$sha"; then
              continue
            fi
            echo "$sha" >> "$todo_file"
            count=$((count + 1))
          done <<< "$all_commits"

          echo "Commits to benchmark: $count"
          if [ "$count" -eq 0 ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            if [ "$count" -gt 0 ]; then
              cat "$todo_file"
            fi
          fi

      - name: Set up history worktree
        if: steps.plan.outputs.skip != 'true'
        env:
          HISTORY_BRANCH: benchmark-history
          SKIP_FILE: benchmarks/skipped-commits.json
        run: |
          set -euo pipefail

          history_worktree="$RUNNER_TEMP/history-worktree"

          if git ls-remote --exit-code --heads origin "$HISTORY_BRANCH" >/dev/null 2>&1; then
            # Already fetched in plan step
            if git merge-base "origin/$HISTORY_BRANCH" HEAD >/dev/null 2>&1; then
              echo "::error::$HISTORY_BRANCH shares history with the default branch. Delete it and re-run." >&2
              exit 1
            fi
            git worktree add "$history_worktree" "origin/$HISTORY_BRANCH"
          else
            git worktree add --orphan -b "$HISTORY_BRANCH" "$history_worktree"
          fi

          # Initialize skipped-commits.json if it doesn't exist
          if [ ! -f "$history_worktree/$SKIP_FILE" ]; then
            mkdir -p "$(dirname "$history_worktree/$SKIP_FILE")"
            echo '[]' > "$history_worktree/$SKIP_FILE"
          fi

          echo "HISTORY_WORKTREE=$history_worktree" >> "$GITHUB_ENV"

      - name: Check if baselines exist
        id: check_baselines
        if: steps.plan.outputs.skip != 'true'
        env:
          HISTORY_FILE: benchmarks/cmakefmt-fixtures-history.json
        run: |
          set -euo pipefail
          # workflow_dispatch always re-measures baselines
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f "$HISTORY_WORKTREE/$HISTORY_FILE" ]; then
            has_baselines=$(python3 -c "
          import json
          with open('$HISTORY_WORKTREE/$HISTORY_FILE') as f:
            data = json.load(f)
          print('true' if 'baselines' in data else 'false')
          ")
          else
            has_baselines="false"
          fi
          echo "skip=$has_baselines" >> "$GITHUB_OUTPUT"

      - name: Install baseline benchmark tools
        if: steps.plan.outputs.skip != 'true' && steps.check_baselines.outputs.skip != 'true'
        run: |
          set -euo pipefail
          pip install cmakelang gersemi pytest pytest-benchmark

      - name: Run cmake_format baseline
        if: steps.plan.outputs.skip != 'true' && steps.check_baselines.outputs.skip != 'true'
        run: |
          pytest "$RUNNER_TEMP/scripts/bench_cmake_format_baseline.py" \
            --benchmark-json="$RUNNER_TEMP/cmake-format-bench.json"

      - name: Run gersemi baseline
        if: steps.plan.outputs.skip != 'true' && steps.check_baselines.outputs.skip != 'true'
        run: |
          pytest "$RUNNER_TEMP/scripts/bench_gersemi_baseline.py" \
            --benchmark-json="$RUNNER_TEMP/gersemi-bench.json"

      - name: Collect baseline results
        if: steps.plan.outputs.skip != 'true' && steps.check_baselines.outputs.skip != 'true'
        env:
          HISTORY_FILE: benchmarks/cmakefmt-fixtures-history.json
        run: |
          set -euo pipefail
          cmake_format_version=$(python3 -c "from cmakelang import __version__; print(__version__)")
          gersemi_version=$(gersemi --version | head -1)

          python3 "$RUNNER_TEMP/scripts/collect_baseline_results.py" \
            --cmake-format-json "$RUNNER_TEMP/cmake-format-bench.json" \
            --gersemi-json "$RUNNER_TEMP/gersemi-bench.json" \
            --cmake-format-version "$cmake_format_version" \
            --gersemi-version "$gersemi_version" \
            --runner "${RUNNER_OS}" \
            --rust-version "${RUST_VERSION}" \
            --history-file "$HISTORY_WORKTREE/$HISTORY_FILE"

      - name: Run benchmark loop
        if: steps.plan.outputs.skip != 'true'
        env:
          HISTORY_FILE: benchmarks/cmakefmt-fixtures-history.json
          SKIP_FILE: benchmarks/skipped-commits.json
        run: |
          set -euo pipefail

          todo_file="$RUNNER_TEMP/commits-to-bench.txt"
          entry_file="$RUNNER_TEMP/bench-entry.json"

          while IFS= read -r sha; do
            echo "::group::Benchmarking $sha"

            commit_ts="$(git show -s --format=%aI "$sha")"

            git checkout -f "$sha" --

            # Clean stale Criterion output to prevent cross-commit contamination
            rm -rf target/criterion/formatter_fixtures

            # Overlay HEAD's bench harness and synthetic fixture onto the old commit
            cp "$RUNNER_TEMP/bench/formatter_fixtures_bench.rs" \
              crates/cmakefmt/benches/formatter_fixtures_bench.rs
            mkdir -p crates/cmakefmt/tests/formatter/respositories/synthetic
            cp -r "$RUNNER_TEMP/bench/synthetic/." \
              crates/cmakefmt/tests/formatter/respositories/synthetic/

            # Attempt benchmark; on failure, record skip and continue
            if ! cargo bench --bench formatter_fixtures_bench; then
              echo "::warning::Benchmark failed for $sha — recording as skipped"
              python3 -c "
          import json, sys
          path = sys.argv[1]
          with open(path, 'r') as f:
              skipped = json.load(f)
          if sys.argv[2] not in skipped:
              skipped.append(sys.argv[2])
          with open(path, 'w') as f:
              json.dump(skipped, f, indent=2)
              f.write('\n')
          " "$HISTORY_WORKTREE/$SKIP_FILE" "$sha"
              echo "::endgroup::"
              continue
            fi

            python3 "$RUNNER_TEMP/scripts/collect_benchmark_results.py" \
              --criterion-dir "target/criterion" \
              --output "$entry_file" \
              --commit-sha "$sha" \
              --commit-timestamp "$commit_ts" \
              --runner "${RUNNER_OS}" \
              --rust-version "${RUST_VERSION}"

            python3 "$RUNNER_TEMP/scripts/append_benchmark_history.py" \
              --entry-file "$entry_file" \
              --history-file "$HISTORY_WORKTREE/$HISTORY_FILE"

            rm -f "$entry_file"

            echo "::endgroup::"
          done < "$todo_file"

          # Restore working tree to default branch
          git checkout -f "$DEFAULT_BRANCH_SHA" --

      - name: Publish benchmark history
        if: steps.plan.outputs.skip != 'true'
        env:
          HISTORY_BRANCH: benchmark-history
          HISTORY_FILE: benchmarks/cmakefmt-fixtures-history.json
          SKIP_FILE: benchmarks/skipped-commits.json
        run: |
          set -euo pipefail

          git -C "$HISTORY_WORKTREE" config user.name "github-actions[bot]"
          git -C "$HISTORY_WORKTREE" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git -C "$HISTORY_WORKTREE" add "$HISTORY_FILE" "$SKIP_FILE"

          if git -C "$HISTORY_WORKTREE" diff --cached --quiet; then
            echo "No benchmark history changes to commit"
            exit 0
          fi

          git -C "$HISTORY_WORKTREE" commit -m "bench: update fixture benchmark history"
          git -C "$HISTORY_WORKTREE" push origin "HEAD:$HISTORY_BRANCH"

      - name: Clean up history worktree
        if: always() && steps.plan.outputs.skip != 'true'
        run: |
          git worktree remove "$HISTORY_WORKTREE" --force || true
