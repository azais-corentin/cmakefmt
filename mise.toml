[tasks."build:debug:cli"]
description = "Build the CLI binary (debug)"
run = "cargo build -p cmakefmt-cli"

[tasks."build:debug:wasm"]
description = "Build the WASM plugin (debug)"
run = "cargo build -p cmakefmt-dprint --target wasm32-unknown-unknown"

[tasks."build:debug"]
alias = "build"
description = "Build all crates (debug)"
run = [
  "cargo build -p cmakefmt -p cmakefmt-cli",
  "cargo build -p cmakefmt-dprint --target wasm32-unknown-unknown",
]

[tasks."build:release"]
description = "Build optimized WASM plugin"
run = "cargo build --profile release-wasm -p cmakefmt-dprint --target wasm32-unknown-unknown"

[tasks.bench]
description = "Run Criterion benchmarks"
run = "cargo bench --bench formatter_fixtures_bench"

[tasks.test]
description = "Run all tests on host target"
run = "cargo test"

[tasks."test:filter"]
description = "Run formatter tests matching a fixture path pattern"
usage = 'arg "<pattern>" help="Substring match on fixture path (e.g. 04_casing, 06_comments)"'
run = 'cargo test --test formatter_tests -- "$usage_pattern"'

[tasks.check]
description = "Clippy + rustfmt check"
run = ["cargo clippy -- -D warnings", "cargo fmt --check"]

[tasks.size]
description = "Report WASM binary size"
depends = ["build:release"]
run = '''
#!/usr/bin/env bash
file="target/wasm32-unknown-unknown/release-wasm/cmakefmt_dprint.wasm"
bytes=$(stat -c %s "$file")
if [ "$bytes" -ge 1048576 ]; then
  printf "%s: %.2f MiB (%d bytes)\n" "$file" "$(echo "scale=2; $bytes/1048576" | bc)" "$bytes"
else
  printf "%s: %.2f KiB (%d bytes)\n" "$file" "$(echo "scale=2; $bytes/1024" | bc)" "$bytes"
fi
'''

[tasks.pre-commit]
description = "Run pre-commit hooks"
run = "hk run pre-commit"

[tasks."pkl:format"]
description = "Format Pkl files"
run = '''
#!/usr/bin/env bash
pkl format -
code=$?
([ $code -eq 0 ] || [ $code -eq 11 ]) && exit 0 || exit $code
'''
[tools]
actionlint = "latest"
bun = "latest"
cocogitto = "latest"
dprint = "latest"
hk = "latest"
java = "latest"
pinact = "latest"
pkl = "latest"
zizmor = "latest"
