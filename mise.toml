[tasks.build]
description = "Build the WASM plugin (debug)"
run = "cargo build --target wasm32-unknown-unknown"

[tasks.release]
description = "Build optimized WASM plugin"
run = "cargo build --release --target wasm32-unknown-unknown"

[tasks.test]
description = "Run all tests on host target"
run = "cargo test"

[tasks.fmt]
description = "Format sample files with the plugin"
run = "dprint fmt --plugins ./target/wasm32-unknown-unknown/release/cmakefmt.wasm"

[tasks.check]
description = "Clippy + rustfmt check"
run = ["cargo clippy -- -D warnings", "cargo fmt --check"]

[tasks.size]
description = "Report WASM binary size"
run = "ls -lh target/wasm32-unknown-unknown/release/*.wasm"

[tasks.test-diff]
run = """
find tests -name '*.in.cmake' -print0 \
     | sed -z 's/\\.in\\.cmake$//' \
     | sort -z \
     | fzf --read0 \
           --preview 'diff --color=always -u {}.in.cmake {}.out.cmake || true' \
           --preview-window 'right,70%,wrap' \
           --header 'ENTER: open full side-by-side diff  |  ESC: quit' \
           --bind 'enter:execute(diff -y --color=always {}.in.cmake {}.out.cmake | less -R)'
"""
