<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cmakefmt Benchmarks</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #1a1b26;
    --surface: #24283b;
    --border: #414868;
    --text: #c0caf5;
    --text-muted: #565f89;
    --accent: #7aa2f7;
    --accent2: #9ece6a;
    --accent3: #e0af68;
    --error: #f7768e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    padding: 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.5rem; font-weight: 600; }
  header p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
  }
  .chart-card h2 {
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 1rem;
    color: var(--text-muted);
  }
  .chart-wrap { position: relative; width: 100%; }
  #loading {
    text-align: center;
    padding: 4rem;
    color: var(--text-muted);
    font-size: 1rem;
  }
  #loading .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error {
    display: none;
    text-align: center;
    padding: 3rem;
    color: var(--error);
    font-size: 0.95rem;
  }
  #charts { display: none; }
  #charts.visible { display: flex; flex-direction: column; gap: 2.5rem; }
  .meta-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    margin-top: 1.5rem;
  }
  .meta-table th, .meta-table td {
    padding: 0.4rem 0.75rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .meta-table th { color: var(--text-muted); font-weight: 500; }
  .meta-table td { font-family: monospace; }
</style>
</head>
<body>

<header>
  <h1>cmakefmt — Benchmark Dashboard</h1>
  <p>Formatter performance tracked across commits</p>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading benchmark data…</div>
  </div>
  <div id="error"></div>
  <div id="charts">
    <div class="chart-card">
      <h2>Aggregate Throughput over Time</h2>
      <div class="chart-wrap"><canvas id="chartAggregate"></canvas></div>
    </div>
    <div class="chart-card">
      <h2>Per-Fixture Mean Time (with 95% CI)</h2>
      <div class="chart-wrap"><canvas id="chartMeanTime"></canvas></div>
    </div>
    <div class="chart-card">
      <h2>Per-Fixture Throughput over Time</h2>
      <div class="chart-wrap"><canvas id="chartFixtureThroughput"></canvas></div>
    </div>
    <div class="chart-card">
      <h2>Commit Metadata</h2>
      <table class="meta-table">
        <thead><tr><th>Commit</th><th>Date</th><th>Runner</th><th>Rust</th><th>Agg. Throughput</th></tr></thead>
        <tbody id="metaBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const DATA_URL = 'https://gist.githubusercontent.com/azais-corentin/2b47692801ddaa693fb60a9138748b3c/raw/benchmarks.json';

const PALETTE = [
  '#7aa2f7', '#9ece6a', '#e0af68', '#f7768e', '#bb9af7',
  '#7dcfff', '#73daca', '#ff9e64', '#c0caf5', '#2ac3de',
];

// --- Helpers ---

function shortSha(sha) { return sha.slice(0, 7); }

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
}

function commitLabel(entry) {
  return shortSha(entry.commit_sha) + '\n' + formatDate(entry.commit_timestamp);
}

function toMs(seconds) { return seconds * 1000; }

function fmtGBps(v) { return v.toFixed(4) + ' GB/s'; }

// --- Chart defaults ---

function applyDefaults() {
  Chart.defaults.color = '#c0caf5';
  Chart.defaults.borderColor = '#414868';
  Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace";
  Chart.defaults.font.size = 12;
}

function baseTooltip() {
  return {
    backgroundColor: '#1a1b26',
    borderColor: '#414868',
    borderWidth: 1,
    titleColor: '#c0caf5',
    bodyColor: '#c0caf5',
    padding: 10,
    cornerRadius: 4,
  };
}

// --- Chart builders ---

function buildAggregateChart(entries, labels) {
  const data = entries.map(e => e.aggregate.aggregate_throughput_gb_per_s);
  new Chart(document.getElementById('chartAggregate'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Aggregate Throughput (GB/s)',
        data,
        borderColor: PALETTE[0],
        backgroundColor: PALETTE[0] + '33',
        fill: true,
        tension: 0.25,
        pointRadius: 5,
        pointHoverRadius: 7,
        borderWidth: 2,
      }],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          ...baseTooltip(),
          callbacks: {
            title: (items) => {
              const i = items[0].dataIndex;
              const e = entries[i];
              return `Commit ${e.commit_sha}`;
            },
            afterTitle: (items) => {
              const e = entries[items[0].dataIndex];
              return `${formatDate(e.commit_timestamp)}  •  ${e.runner}  •  ${e.rust_version}`;
            },
            label: (item) => ' ' + fmtGBps(item.parsed.y),
          },
        },
      },
      scales: {
        y: {
          title: { display: true, text: 'GB/s' },
          grid: { color: '#414868' },
        },
        x: {
          grid: { display: false },
          ticks: { maxRotation: 0 },
        },
      },
    },
  });
}

function buildMeanTimeChart(entries, labels, fixtureNames) {
  const datasets = [];
  fixtureNames.forEach((name, fi) => {
    const color = PALETTE[fi % PALETTE.length];

    // Upper CI bound (hidden, used as fill target)
    const upperData = entries.map(e => {
      const f = e.fixtures.find(fx => fx.fixture_stem === name);
      return f ? toMs(f.mean_confidence_interval_upper_seconds) : null;
    });
    datasets.push({
      label: name + ' CI upper',
      data: upperData,
      borderColor: 'transparent',
      backgroundColor: 'transparent',
      pointRadius: 0,
      fill: false,
      hidden: false,
      // Internal marker
      _ciUpper: true,
    });

    // Lower CI bound, filled to previous dataset index
    const lowerData = entries.map(e => {
      const f = e.fixtures.find(fx => fx.fixture_stem === name);
      return f ? toMs(f.mean_confidence_interval_lower_seconds) : null;
    });
    datasets.push({
      label: name + ' CI lower',
      data: lowerData,
      borderColor: 'transparent',
      backgroundColor: color + '22',
      pointRadius: 0,
      fill: '-1',
      hidden: false,
      _ciLower: true,
    });

    // Mean line
    const meanData = entries.map(e => {
      const f = e.fixtures.find(fx => fx.fixture_stem === name);
      return f ? toMs(f.mean_seconds) : null;
    });
    datasets.push({
      label: name,
      data: meanData,
      borderColor: color,
      backgroundColor: color,
      pointRadius: 5,
      pointHoverRadius: 7,
      borderWidth: 2,
      tension: 0.25,
      fill: false,
    });
  });

  new Chart(document.getElementById('chartMeanTime'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            filter: (item) => !item.text.includes(' CI '),
          },
        },
        tooltip: {
          ...baseTooltip(),
          filter: (item) => !item.dataset._ciUpper && !item.dataset._ciLower,
          callbacks: {
            title: (items) => {
              const e = entries[items[0].dataIndex];
              return `Commit ${e.commit_sha}`;
            },
            afterTitle: (items) => {
              const e = entries[items[0].dataIndex];
              return `${formatDate(e.commit_timestamp)}  •  ${e.runner}`;
            },
            label: (item) => {
              const e = entries[item.dataIndex];
              const f = e.fixtures.find(fx => fx.fixture_stem === item.dataset.label);
              if (!f) return ` ${item.dataset.label}: N/A`;
              const lo = toMs(f.mean_confidence_interval_lower_seconds).toFixed(3);
              const hi = toMs(f.mean_confidence_interval_upper_seconds).toFixed(3);
              return ` ${item.dataset.label}: ${item.parsed.y.toFixed(3)} ms  [${lo} – ${hi}]`;
            },
          },
        },
      },
      scales: {
        y: {
          title: { display: true, text: 'Mean Time (ms)' },
          grid: { color: '#414868' },
        },
        x: {
          grid: { display: false },
          ticks: { maxRotation: 0 },
        },
      },
    },
  });
}

function buildFixtureThroughputChart(entries, labels, fixtureNames) {
  const datasets = fixtureNames.map((name, fi) => {
    const color = PALETTE[fi % PALETTE.length];
    const data = entries.map(e => {
      const f = e.fixtures.find(fx => fx.fixture_stem === name);
      return f ? f.throughput_gb_per_s : null;
    });
    return {
      label: name,
      data,
      borderColor: color,
      backgroundColor: color + '33',
      fill: true,
      tension: 0.25,
      pointRadius: 5,
      pointHoverRadius: 7,
      borderWidth: 2,
    };
  });

  new Chart(document.getElementById('chartFixtureThroughput'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        tooltip: {
          ...baseTooltip(),
          callbacks: {
            title: (items) => {
              const e = entries[items[0].dataIndex];
              return `Commit ${e.commit_sha}`;
            },
            afterTitle: (items) => {
              const e = entries[items[0].dataIndex];
              return `${formatDate(e.commit_timestamp)}  •  ${e.runner}`;
            },
            label: (item) => ' ' + item.dataset.label + ': ' + fmtGBps(item.parsed.y),
          },
        },
      },
      scales: {
        y: {
          title: { display: true, text: 'GB/s' },
          grid: { color: '#414868' },
        },
        x: {
          grid: { display: false },
          ticks: { maxRotation: 0 },
        },
      },
    },
  });
}

function buildMetaTable(entries) {
  const tbody = document.getElementById('metaBody');
  entries.forEach(e => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${shortSha(e.commit_sha)}</td>
      <td>${formatDate(e.commit_timestamp)}</td>
      <td>${e.runner}</td>
      <td>${e.rust_version}</td>
      <td>${fmtGBps(e.aggregate.aggregate_throughput_gb_per_s)}</td>
    `;
    tbody.appendChild(tr);
  });
}

// --- Main ---

async function main() {
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');
  const chartsEl = document.getElementById('charts');

  try {
    const resp = await fetch(DATA_URL + '?_=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const json = await resp.json();

    const entries = json.entries.slice().sort(
      (a, b) => new Date(a.commit_timestamp) - new Date(b.commit_timestamp)
    );

    if (entries.length === 0) throw new Error('No benchmark entries found.');

    // Collect unique fixture stems across all entries.
    const fixtureSet = new Set();
    entries.forEach(e => e.fixtures.forEach(f => fixtureSet.add(f.fixture_stem)));
    const fixtureNames = [...fixtureSet].sort();

    const labels = entries.map(commitLabel);

    applyDefaults();
    buildAggregateChart(entries, labels);
    buildMeanTimeChart(entries, labels, fixtureNames);
    buildFixtureThroughputChart(entries, labels, fixtureNames);
    buildMetaTable(entries);

    loadingEl.style.display = 'none';
    chartsEl.classList.add('visible');
  } catch (err) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.textContent = 'Failed to load benchmark data: ' + err.message;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
