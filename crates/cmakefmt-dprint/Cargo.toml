[package]
name = "cmakefmt-dprint"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "dprint plugin for CMake formatting"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0.102"
cmakefmt = { path = "../cmakefmt" }
dprint-core = { version = "0.67.4", features = ["formatting", "wasm"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["preserve_order"] }
