[package]
name = "cmakefmt-cli"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "CMake formatter CLI"

[[bin]]
name = "cmakefmt"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.5.60", features = ["derive"] }
cmakefmt = { path = "../cmakefmt", features = ["cli"] }
glob = "0.3.3"
toml = "1.0.6"
